<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOA 3D Space Modeler</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0F1117;--s1:#1A1D27;--s2:#232733;--bd:#2E3340;--t1:#E8E9ED;--t2:#9498A6;--ac:#4F8CFF;--ac2:#3A6FD8;--red:#FF5757;--grn:#3DD68C;--blu:#4F8CFF;--org:#FF9F43;--pur:#A78BFA}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--t1);overflow:hidden;height:100vh;display:flex}
/* PANEL */
.panel{width:300px;min-width:300px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh;overflow:hidden}
.ph{padding:10px 14px;border-bottom:1px solid var(--bd)}
.ph h1{font-size:14px;font-weight:600}
.ph p{font-size:10px;color:var(--t2);margin-top:2px}
.ps{padding:8px 14px;border-bottom:1px solid var(--bd)}
.ps h3{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--t2);margin-bottom:6px}
.sb{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px}
.sb2{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.sbn{background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--t1);padding:6px 0;font-size:9px;font-family:inherit;cursor:pointer;text-align:center;transition:all .12s}
.sbn:hover{background:var(--ac);border-color:var(--ac)}
.sbn .ic{font-size:14px;display:block;margin-bottom:1px}
.sbn.mart{border-color:#FF9F43;color:#FF9F43}
.sbn.mart:hover{background:#FF9F43;color:#0F1117}
.cr{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.cw{width:18px;height:18px;border-radius:3px;border:2px solid transparent;cursor:pointer}
.cw.a{border-color:white}
.ol{flex:1;overflow-y:auto;padding:5px}
.ol::-webkit-scrollbar{width:3px}
.ol::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.oi{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:6px 8px;margin-bottom:3px;cursor:pointer;position:relative}
.oi:hover{border-color:var(--ac)}
.oi.sel{border-color:var(--ac);background:rgba(79,140,255,.1)}
.oi.lk{opacity:.6}
.oi .nm{font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px}
.oi .nm .dt{width:7px;height:7px;border-radius:2px;display:inline-block}
.oi .cd{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--t2);margin-top:2px}
.oi .ac{position:absolute;top:4px;right:4px;display:flex;gap:2px}
.oi .ab{background:none;border:none;color:var(--t2);cursor:pointer;font-size:10px;padding:1px 2px;border-radius:3px}
.oi .ab:hover{color:var(--t1);background:rgba(255,255,255,.1)}
.oi .ab.dl:hover{color:var(--red);background:rgba(255,87,87,.1)}
/* PROPS */
.pp{border-top:1px solid var(--bd);padding:8px 14px;max-height:320px;overflow-y:auto}
.pp h3{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--t2);margin-bottom:6px}
.pr{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.pr label{font-size:10px;color:var(--t2);min-width:16px;text-align:right;font-family:'IBM Plex Mono',monospace;font-weight:500}
.pr input,.pr select{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:4px;color:var(--t1);padding:3px 5px;font-size:11px;font-family:'IBM Plex Mono',monospace;outline:none;width:0}
.pr input:focus,.pr select:focus{border-color:var(--ac)}
.pg{font-size:9px;color:var(--t2);margin:5px 0 3px;text-transform:uppercase;letter-spacing:.5px}
/* TEXTURE */
.tx-box{border:1px dashed var(--bd);border-radius:6px;padding:6px;margin:5px 0;position:relative;overflow:hidden;min-height:52px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s}
.tx-box:hover{border-color:var(--ac)}
.tx-box img{max-width:100%;max-height:48px;border-radius:3px;object-fit:contain}
.tx-box .ph2{font-size:10px;color:var(--t2);text-align:center}
.tx-box .ph2 span{display:block;font-size:18px;margin-bottom:2px}
.tx-clr{position:absolute;top:3px;right:3px;background:var(--red);border:none;border-radius:3px;color:white;font-size:10px;padding:1px 4px;cursor:pointer;line-height:1.4}
/* VIEWPORT */
.vp-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.view-toggle{background:var(--s1);border-bottom:1px solid var(--bd);padding:5px 10px;display:flex;gap:4px;align-items:center}
.vt-btn{background:var(--s2);border:1px solid var(--bd);border-radius:4px;color:var(--t2);padding:3px 10px;font-size:10px;font-family:inherit;cursor:pointer;transition:all .1s}
.vt-btn.a{background:var(--ac);border-color:var(--ac);color:white}
.views{flex:1;display:flex;overflow:hidden}
/* 2D VIEW */
.v2d{flex:1;position:relative;overflow:hidden;background:#0a0c12;border-right:1px solid var(--bd)}
.v2d canvas{position:absolute;top:0;left:0}
.v2d .label2d{position:absolute;top:6px;left:8px;font-size:10px;font-weight:600;color:var(--t2);font-family:'IBM Plex Mono',monospace;pointer-events:none}
/* 3D VIEW */
.vp{flex:1;position:relative;overflow:hidden;background:var(--bg)}
.vc{position:absolute;top:8px;left:8px;display:flex;gap:3px;z-index:10;flex-wrap:wrap;max-width:200px}
.vb{background:var(--s1);border:1px solid var(--bd);border-radius:4px;color:var(--t2);padding:3px 6px;font-size:9px;font-family:inherit;cursor:pointer}
.vb:hover{color:var(--t1);border-color:var(--ac)}
.vi{position:absolute;bottom:6px;left:6px;font-size:9px;color:var(--t2);font-family:'IBM Plex Mono',monospace;pointer-events:none}
.mi{position:absolute;top:6px;right:6px;font-size:10px;padding:3px 7px;border-radius:4px;font-weight:500;z-index:10;pointer-events:none}
.mr{background:rgba(79,140,255,.2);color:var(--ac)}
.md{background:rgba(61,214,140,.2);color:var(--grn)}
#s3{position:absolute;inset:0;perspective:2200px}
#sc{position:absolute;top:50%;left:50%;width:0;height:0;transform-style:preserve-3d}
/* MISC */
.er{display:flex;gap:4px;margin-top:6px}
.eb{flex:1;background:var(--ac2);border:none;border-radius:4px;color:white;padding:5px 0;font-size:10px;font-family:inherit;font-weight:500;cursor:pointer}
.eb:hover{background:var(--ac)}
.eb.dn{background:#5A2020}.eb.dn:hover{background:var(--red)}
.eb.gn{background:#1a6b3a}.eb.gn:hover{background:var(--grn);color:#0F1117}
.tb{display:flex;border-bottom:1px solid var(--bd)}
.tn{flex:1;padding:7px 0;text-align:center;font-size:10px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent}
.tn:hover{color:var(--t1)}
.tn.a{color:var(--ac);border-bottom-color:var(--ac)}
.rb{display:flex;gap:2px;margin-top:2px}
.rb button{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:3px;color:var(--t2);padding:2px 0;font-size:9px;font-family:inherit;cursor:pointer}
.rb button:hover{background:var(--ac);color:white;border-color:var(--ac)}
.badge{display:inline-block;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:600;margin-left:4px;vertical-align:middle}
.badge.mart{background:rgba(255,159,67,.2);color:var(--org)}
</style>
</head>
<body>
<div class="panel">
  <div class="ph">
    <input type="text" id="projTitle" value="ZOA Korean Mart" style="background:none;border:none;color:var(--t1);font-size:14px;font-weight:600;font-family:inherit;width:100%;outline:none;padding:0" onchange="uI()">
    <p id="ri"></p>
  </div>
  <div class="tb">
    <div class="tn a" id="t1" onclick="st('obj')">도형</div>
    <div class="tn" id="t2" onclick="st('mart')">마트</div>
    <div class="tn" id="t3" onclick="st('spc')">공간</div>
    <div class="tn" id="t4" onclick="st('sav')">저장</div>
  </div>

  <!-- TAB: 도형 -->
  <div id="p1">
    <div class="ps">
      <h3>일반 도형</h3>
      <div class="sb">
        <button class="sbn" onclick="aS('box')"><span class="ic">▬</span>직사각형</button>
        <button class="sbn" onclick="aS('cube')"><span class="ic">▣</span>정사각형</button>
        <button class="sbn" onclick="aS('cylinder')"><span class="ic">◎</span>원기둥</button>
        <button class="sbn" onclick="aS('wall')"><span class="ic">▯</span>벽</button>
        <button class="sbn" onclick="aS('pillar')"><span class="ic">▮</span>기둥</button>
        <button class="sbn" onclick="aS('counter')"><span class="ic">▭</span>카운터</button>
      </div>
      <h3 style="margin-top:8px">색상</h3>
      <div class="cr" id="cP"></div>
    </div>
  </div>

  <!-- TAB: 마트 전용 -->
  <div id="p2" style="display:none">
    <div class="ps">
      <h3>마트 전용 오브젝트 <span class="badge mart">MART</span></h3>
      <div class="sb2">
        <button class="sbn mart" onclick="aMart('shelf')"><span class="ic">🗄</span>진열대</button>
        <button class="sbn mart" onclick="aMart('fridge')"><span class="ic">🧊</span>냉장고</button>
        <button class="sbn mart" onclick="aMart('freezer')"><span class="ic">❄</span>냉동고</button>
        <button class="sbn mart" onclick="aMart('checkout')"><span class="ic">🏪</span>계산대</button>
        <button class="sbn mart" onclick="aMart('floor')"><span class="ic">⬛</span>바닥재</button>
        <button class="sbn mart" onclick="aMart('ceiling')"><span class="ic">⬜</span>천장재</button>
      </div>
      <div style="margin-top:6px;font-size:9px;color:var(--t2);padding:5px 6px;background:rgba(255,159,67,.08);border-radius:4px;border:1px solid rgba(255,159,67,.2)">
        오브젝트 선택 후 속성에서 사진 첨부 가능
      </div>
    </div>
    <div class="ps">
      <h3>재질 / 색상</h3>
      <div class="cr" id="cP2"></div>
    </div>
  </div>

  <!-- TAB: 공간 -->
  <div id="p3" style="display:none">
    <div class="ps">
      <h3>기본 공간 크기</h3>
      <div class="pr">
        <label style="color:var(--red)">W</label><input type="number" id="rW" step=".5" min="1" onchange="uR()">
        <label style="color:var(--grn)">D</label><input type="number" id="rD" step=".5" min="1" onchange="uR()">
        <label style="color:var(--blu)">H</label><input type="number" id="rH" step=".1" min="1" onchange="uR()">
      </div>
      <div style="font-size:10px;color:var(--t2);margin-top:4px" id="ai"></div>
      <h3 style="margin-top:10px">공간 확장</h3>
      <div class="sb2">
        <button class="sbn" onclick="aSp('rect')"><span class="ic">▭</span>사각형</button>
        <button class="sbn" onclick="aSp('ellipse')"><span class="ic">⬮</span>원/타원</button>
        <button class="sbn" onclick="aSp('semi')"><span class="ic">⌓</span>반원</button>
        <button class="sbn" onclick="aSp('quarter')"><span class="ic">◔</span>1/4원</button>
      </div>
      <div style="font-size:9px;color:var(--t2);margin-top:4px">공간: 바닥+모서리만 표시. 🔒로 고정.</div>
    </div>
  </div>

  <!-- TAB: 저장 -->
  <div id="p4" style="display:none">
    <div class="ps">
      <h3>저장 슬롯 (5개)</h3>
      <div id="sL"></div>
      <div class="er" style="margin-top:8px">
        <button class="eb" onclick="eJ()">JSON↓</button>
        <button class="eb" onclick="iJ()">JSON↑</button>
      </div>
      <div class="er"><button class="eb dn" onclick="cA()">전체삭제</button></div>
    </div>
  </div>

  <div class="ol" id="oL"></div>

  <!-- PROPS PANEL -->
  <div class="pp" id="pp" style="display:none">
    <h3>속성</h3>
    <div class="pr"><label>이름</label><input type="text" id="pN" onchange="uP()"></div>

    <!-- Texture upload for mart objects -->
    <div id="txSection" style="display:none">
      <div class="pg">사진 텍스처</div>
      <div class="tx-box" id="txBox" onclick="document.getElementById('txFile').click()">
        <div class="ph2" id="txPh"><span>📷</span>사진 첨부 (클릭)</div>
        <img id="txImg" style="display:none">
        <button class="tx-clr" id="txClr" style="display:none" onclick="clrTx(event)">✕</button>
      </div>
      <input type="file" id="txFile" accept="image/*" style="display:none" onchange="onTxFile(event)">
    </div>

    <div class="pg">위치 (m)</div>
    <div class="pr">
      <label style="color:var(--red)">X</label><input type="number" id="pX" step=".1" onchange="uP()">
      <label style="color:var(--grn)">Y</label><input type="number" id="pY" step=".1" onchange="uP()">
      <label style="color:var(--blu)">Z</label><input type="number" id="pZ" step=".1" onchange="uP()">
    </div>
    <div class="pg">크기 (m)</div>
    <div class="pr" id="sR">
      <label>W</label><input type="number" id="pW" step=".1" min=".1" onchange="uP()">
      <label>D</label><input type="number" id="pD" step=".1" min=".1" onchange="uP()">
      <label>H</label><input type="number" id="pH" step=".1" min=".1" onchange="uP()">
    </div>
    <div class="pr" id="rR" style="display:none">
      <label>R</label><input type="number" id="pR" step=".1" min=".1" onchange="uP()">
      <label>H</label><input type="number" id="pCH" step=".1" min=".1" onchange="uP()">
    </div>
    <div class="pg">회전 (°)</div>
    <div class="pr">
      <label style="color:var(--red)">X</label><input type="number" id="pRX" step="5" onchange="uP()">
      <label style="color:var(--grn)">Y</label><input type="number" id="pRY" step="5" onchange="uP()">
      <label style="color:var(--blu)">Z</label><input type="number" id="pRZ" step="15" onchange="uP()">
    </div>
    <div class="rb">
      <button onclick="rO('z',-90)">Z-90</button>
      <button onclick="rO('z',-45)">Z-45</button>
      <button onclick="rO('z',45)">Z+45</button>
      <button onclick="rO('z',90)">Z+90</button>
    </div>
    <div class="rb" style="margin-top:2px">
      <button onclick="rO('x',90)">X+90</button>
      <button onclick="rO('x',-90)">X-90</button>
      <button onclick="rO('y',90)">Y+90</button>
      <button onclick="rO('y',-90)">Y-90</button>
    </div>
  </div>
</div>

<!-- VIEWPORT AREA -->
<div class="vp-wrap">
  <div class="view-toggle">
    <button class="vt-btn" id="vb3d" onclick="setView('3d')">3D 뷰</button>
    <button class="vt-btn a" id="vb2d3d" onclick="setView('split')">2D + 3D 분할</button>
    <button class="vt-btn" id="vb2d" onclick="setView('2d')">2D 도면</button>
    <span style="margin-left:auto;font-size:10px;color:var(--t2)">드래그: 이동/회전 · 휠: 줌</span>
  </div>

  <div class="views" id="views">
    <!-- 2D Canvas View -->
    <div class="v2d" id="v2dPane" style="display:flex">
      <div class="label2d">2D 도면 (위에서)</div>
      <canvas id="c2d"></canvas>
    </div>
    <!-- 3D CSS View -->
    <div class="vp" id="vp">
      <div class="vc">
        <button class="vb" onclick="sv(-25,55)">대각선</button>
        <button class="vb" onclick="sv(0,0)">위에서</button>
        <button class="vb" onclick="sv(0,90)">정면</button>
        <button class="vb" onclick="sv(-90,90)">측면</button>
        <button class="vb" onclick="sv(-45,45)">ISO</button>
      </div>
      <div class="mi" id="mI"></div>
      <div id="s3"><div id="sc"></div></div>
      <div class="vi">드래그:회전 · 도형클릭+드래그:이동</div>
    </div>
  </div>
</div>

<input type="file" id="fI" accept=".json" style="display:none">

<script>
(function(){
var O=[],sel=null,nI=1,cC='#4F8CFF';
var S=14,RW=8.5,RD=25.5,RH=3.2;
var rZ=-25,rX=55,zoom=1,cD=false,oD=false,dO=null,lx=0,ly=0;
var currentView='split';
var sc=document.getElementById('sc'),oL=document.getElementById('oL'),pp=document.getElementById('pp'),mI=document.getElementById('mI');
var c2d=document.getElementById('c2d'),ctx=c2d.getContext('2d');
var v2dPane=document.getElementById('v2dPane'),vp=document.getElementById('vp');

// Mart object defaults
var MART_DEFS={
  shelf:{name:'진열대',color:'#C0A882',w:1.2,d:0.5,h:1.8,icon:'🗄'},
  fridge:{name:'냉장고',color:'#5BB8FF',w:0.8,d:0.7,h:2.0,icon:'🧊'},
  freezer:{name:'냉동고',color:'#4DE8FF',w:1.0,d:0.8,h:1.5,icon:'❄'},
  checkout:{name:'계산대',color:'#A78BFA',w:1.5,d:0.8,h:0.9,icon:'🏪'},
  floor:{name:'바닥재',color:'#888580',w:RW,d:RD,h:0.05,icon:'⬛'},
  ceiling:{name:'천장재',color:'#AAAAAA',w:RW,d:RD,h:0.05,icon:'⬜'}
};
var MART_TYPES=Object.keys(MART_DEFS);

function r2(v){return Math.round(v*10)/10}
function rg(h,a){return'rgba('+parseInt(h.slice(1,3),16)+','+parseInt(h.slice(3,5),16)+','+parseInt(h.slice(5,7),16)+','+a+')'}
function isMart(o){return MART_TYPES.indexOf(o.type)>=0}

// View switching
window.setView=function(v){
  currentView=v;
  document.getElementById('vb3d').classList.toggle('a',v==='3d');
  document.getElementById('vb2d3d').classList.toggle('a',v==='split');
  document.getElementById('vb2d').classList.toggle('a',v==='2d');
  v2dPane.style.display=(v==='3d')?'none':'flex';
  vp.style.display=(v==='2d')?'none':'block';
  ren2d();
  setTimeout(function(){ren2d()},50);
};

function uI(){
  var mainA=r2(RW*RD);
  var extraA=0;
  O.forEach(function(o){if(o.type==='space'){
    if(o.shape==='ellipse')extraA+=Math.PI*(o.w/2)*(o.d/2);
    else if(o.shape==='semi')extraA+=Math.PI*(o.w/2)*(o.d/2)/2;
    else if(o.shape==='quarter')extraA+=Math.PI*(o.w/2)*(o.d/2)/4;
    else extraA+=o.w*o.d;
  }});
  var totalA=r2(mainA+extraA);
  document.getElementById('ri').textContent=RW+'×'+RD+'×'+RH+'m · '+totalA+'m²';
  document.getElementById('ai').textContent='면적:'+mainA+'m² 체적:'+r2(RW*RD*RH)+'m³';
  document.getElementById('rW').value=RW;document.getElementById('rD').value=RD;document.getElementById('rH').value=RH;
}

// Tabs
window.st=function(t){
  ['obj','mart','spc','sav'].forEach(function(k,i){
    document.getElementById('t'+(i+1)).classList.toggle('a',k===t);
    document.getElementById('p'+(i+1)).style.display=k===t?'':'none';
  });
  if(t==='sav')rSl();
};

window.uR=function(){RW=parseFloat(document.getElementById('rW').value)||8.5;RD=parseFloat(document.getElementById('rD').value)||25.5;RH=parseFloat(document.getElementById('rH').value)||3.2;uI();ren();ren2d()};

// Add mart object
window.aMart=function(type){
  var def=MART_DEFS[type];
  var o={id:nI++,type:type,name:def.name+' '+nI,color:def.color,x:1,y:1,z:0,w:def.w,d:def.d,h:def.h,rx:0,ry:0,rz:0,locked:false,texture:null,textureName:null};
  if(type==='floor'){o.x=0;o.y=0;o.z=-0.05;o.w=RW;o.d=RD}
  if(type==='ceiling'){o.x=0;o.y=0;o.z=RH-0.05;o.w=RW;o.d=RD}
  O.push(o);sel=o.id;ren();ren2d();rL();sP(o);
};

// Add space
window.aSp=function(shape){
  var o={id:nI++,type:'space',shape:shape,name:'',color:'#4DE8D0',x:0,y:0,z:0,w:4,d:4,h:RH,rx:0,ry:0,rz:0,locked:false,texture:null};
  if(shape==='rect')o.name='공간 '+o.id;
  else if(shape==='ellipse'){o.name='원공간 '+o.id;o.w=4;o.d=4}

var PAN2={x:0,y:0},ZOOM2=1,pan2ing=false,pan2x=0,pan2y=0;
var drag2O=null,drag2lx=0,drag2ly=0;

function ren2d(){
  if(currentView==='3d')return;
  var pw=v2dPane.offsetWidth,ph=v2dPane.offsetHeight;
  c2d.width=pw;c2d.height=ph;
  ctx.clearRect(0,0,pw,ph);

  // Background grid
  ctx.fillStyle='#0a0c12';
  ctx.fillRect(0,0,pw,ph);

  var px=PAN2.x+pw/2,py=PAN2.y+ph/2;
  var sc2=ZOOM2*12; // pixels per meter

  ctx.save();
  ctx.translate(px,py);
  ctx.scale(1,-1); // flip Y so Y+ is up

  // Grid
  ctx.strokeStyle='rgba(79,140,255,0.08)';
  ctx.lineWidth=0.5;
  var gs=sc2;
  var gx0=-Math.ceil((px)/gs)*gs,gy0=-Math.ceil((ph-py)/gs)*gs;
  for(var gx=gx0;gx<pw-px;gx+=gs){ctx.beginPath();ctx.moveTo(gx,-py);ctx.lineTo(gx,ph-py);ctx.stroke()}
  for(var gy=gy0;gy<ph-py;gy+=gs){ctx.beginPath();ctx.moveTo(-px,gy);ctx.lineTo(pw-px,gy);ctx.stroke()}

  // Room boundary
  var rw=RW*sc2,rd=RD*sc2;
  var rx2=-rw/2,ry2=-rd/2;
  ctx.strokeStyle='rgba(79,140,255,0.5)';
  ctx.lineWidth=2;
  ctx.setLineDash([4,4]);
  ctx.strokeRect(rx2,ry2,rw,rd);
  ctx.setLineDash([]);

  // Room fill
  ctx.fillStyle='rgba(79,140,255,0.04)';
  ctx.fillRect(rx2,ry2,rw,rd);

  // Room label
  ctx.save();ctx.scale(1,-1);
  ctx.font='bold 10px "IBM Plex Mono",monospace';
  ctx.fillStyle='rgba(79,140,255,0.4)';
  ctx.fillText(RW+'m × '+RD+'m',rx2+4,-ry2-14);
  ctx.restore();

  // Draw objects (spaces first, then shapes)
  var sps=O.filter(function(o){return o.type==='space'});
  var shp=O.filter(function(o){return o.type!=='space'});
  sps.concat(shp).forEach(function(o){
    draw2dObj(o,rx2,ry2,sc2);
  });

  // Origin dot
  ctx.fillStyle='rgba(255,87,87,0.8)';
  ctx.beginPath();ctx.arc(rx2,ry2+rd,4,0,Math.PI*2);ctx.fill();

  ctx.restore();
}

function draw2dObj(o,rx2,ry2,sc2){
  var isSel=(o.id===sel);
  var isMartObj=isMart(o);
  ctx.save();

  if(o.type==='cylinder'||o.type==='pillar'){
    var cx=rx2+o.x*sc2+(o.r*sc2);
    var cy=ry2+RD*sc2-o.y*sc2-(o.r*sc2);
    ctx.translate(cx,cy);
    if(o.rz)ctx.rotate(-o.rz*Math.PI/180);
    var r2c=o.r*sc2;
    if(o._txImg){
      ctx.save();
      ctx.beginPath();ctx.arc(0,0,r2c,0,Math.PI*2);ctx.clip();
      ctx.drawImage(o._txImg,-r2c,-r2c,r2c*2,r2c*2);
      ctx.restore();
    }else{
      ctx.fillStyle=rg(o.color,isSel?0.6:0.4);
      ctx.beginPath();ctx.arc(0,0,r2c,0,Math.PI*2);ctx.fill();
    }
    ctx.strokeStyle=isSel?'white':rg(o.color,0.8);
    ctx.lineWidth=isSel?2:1;
    ctx.beginPath();ctx.arc(0,0,r2c,0,Math.PI*2);ctx.stroke();
    // Label
    ctx.save();ctx.scale(1,-1);
    ctx.font='9px "IBM Plex Sans",sans-serif';
    ctx.fillStyle=isSel?'white':'rgba(255,255,255,0.7)';
    ctx.textAlign='center';
    ctx.fillText(o.name,0,3);
    ctx.restore();
  }else{
    var ox=rx2+o.x*sc2;
    var oy=ry2+RD*sc2-o.y*sc2-o.d*sc2;
    var ow=o.w*sc2,od=o.d*sc2;
    ctx.translate(ox+ow/2,oy+od/2);
    if(o.rz)ctx.rotate(-o.rz*Math.PI/180);

    if(o.type==='space'){
      // Space: just outline
      ctx.strokeStyle=isSel?'white':rg(o.color,0.8);
      ctx.lineWidth=isSel?2:1.5;
      ctx.setLineDash([5,3]);
      ctx.fillStyle=rg(o.color,0.1);
      ctx.fillRect(-ow/2,-od/2,ow,od);
      ctx.strokeRect(-ow/2,-od/2,ow,od);
      ctx.setLineDash([]);
    }else{
      // Solid object
      if(o._txImg&&isMartObj){
        // Texture
        ctx.save();
        ctx.beginPath();ctx.rect(-ow/2,-od/2,ow,od);ctx.clip();
        ctx.drawImage(o._txImg,-ow/2,-od/2,ow,od);
        // Tint overlay
        ctx.fillStyle=rg(o.color,0.3);
        ctx.fillRect(-ow/2,-od/2,ow,od);
        ctx.restore();
      }else{
        ctx.fillStyle=rg(o.color,isSel?0.6:0.4);
        ctx.fillRect(-ow/2,-od/2,ow,od);
      }
      ctx.strokeStyle=isSel?'white':rg(o.color,0.9);
      ctx.lineWidth=isSel?2:1;
      ctx.strokeRect(-ow/2,-od/2,ow,od);

      // Icon for mart objects
      if(isMartObj){
        ctx.save();ctx.scale(1,-1);
        var iconMap={shelf:'🗄',fridge:'🧊',freezer:'❄',checkout:'🏪',floor:'⬛',ceiling:'⬜'};
        ctx.font='12px sans-serif';
        ctx.textAlign='center';
        ctx.fillText(iconMap[o.type]||'',0,4);
        ctx.restore();
      }
    }

    // Name label
    ctx.save();ctx.scale(1,-1);
    ctx.font=(isSel?'bold ':'')+' 9px "IBM Plex Sans",sans-serif';
    ctx.fillStyle=isSel?'white':'rgba(255,255,255,0.75)';
    ctx.textAlign='center';
    var labelY=isMartObj?14:4;
    ctx.fillText(o.name,0,labelY);
    ctx.restore();
  }

  // Selection halo
  if(isSel){
    ctx.save();
    ctx.strokeStyle='rgba(79,140,255,0.6)';
    ctx.lineWidth=1;
    ctx.setLineDash([3,3]);
    if(o.type==='cylinder'||o.type==='pillar'){
      // already translated to center
      ctx.beginPath();ctx.arc(0,0,o.r*sc2+5,0,Math.PI*2);ctx.stroke();
    }else{
      var ow2=o.w*sc2,od2=o.d*sc2;
      ctx.strokeRect(-ow2/2-4,-od2/2-4,ow2+8,od2+8);
    }
    ctx.setLineDash([]);
    ctx.restore();
  }

  ctx.restore();
}

function hit2d(mx,my){
  var pw=c2d.width,ph=c2d.height;
  var px=PAN2.x+pw/2,py=PAN2.y+ph/2;
  var sc2=ZOOM2*12;
  var rx2=-RW*sc2/2,ry2=-RD*sc2/2;

  // Convert mouse to world coords (flipped Y)
  var wx=(mx-px)/sc2;
  var wy=-(my-py)/sc2;

  var hit=null;
  var rev=[].concat(O).reverse();
  rev.forEach(function(o){
    if(hit)return;
    if(o.type==='cylinder'||o.type==='pillar'){
      var cx=o.x+o.r;var cy=o.y+o.r;
      var dx=wx-cx-(rx2/sc2);var dy=wy-cy-(-ry2/sc2);
      if(Math.sqrt(dx*dx+dy*dy)<o.r+0.1)hit=o;
    }else{
      var ox=o.x+(rx2/sc2);var oy=o.y+(-ry2/sc2);
      if(wx>=ox&&wx<=ox+o.w&&wy>=oy&&wy<=oy+o.d)hit=o;
    }
  });
  return hit;
}

  re(0,0,0,W,0,0);re(W,0,0,W,D,0);re(0,D,0,W,D,0);re(0,0,0,0,D,0);
  re(0,0,H,W,0,H);re(W,0,H,W,D,H);re(0,D,H,W,D,H);re(0,0,H,0,D,H);
  re(0,0,0,0,0,H);re(W,0,0,W,0,H);re(W,D,0,W,D,H);re(0,D,0,0,D,H);

  var od=document.createElement('div');od.style.cssText='position:absolute;width:6px;height:6px;border-radius:50%;background:var(--red);left:'+(ox-3)+'px;top:'+(oy+D-3)+'px;transform:translateZ(1px);box-shadow:0 0 0 3px rgba(255,87,87,.3)';sc.appendChild(od);

  var sps=O.filter(function(o){return o.type==='space'});
  var shp=O.filter(function(o){return o.type!=='space'});
  sps.concat(shp).forEach(function(o){
    var is=o.id===sel,bw=is?2:1,bc=is?'rgba(255,255,255,.85)':rg(o.color,.4),al=is?.55:.35;
    var isSp=o.type==='space';
    var rx=o.rx||0,ry=o.ry||0,rz=o.rz||0,hasRot=rx||ry||rz;

    var wrap=null;
    if(hasRot){
      var cxP,cyP;
      if(o.type==='cylinder'||o.type==='pillar'){cxP=ox+o.x*S+o.r*S;cyP=oy+D-(o.y+o.r)*S}
      else{cxP=ox+o.x*S+o.w*S/2;cyP=oy+D-o.y*S-o.d*S/2}
      wrap=document.createElement('div');
      wrap.style.cssText='position:absolute;left:'+cxP+'px;top:'+cyP+'px;transform-style:preserve-3d;transform:rotateX('+rx+'deg) rotateY('+ry+'deg) rotateZ('+(-rz)+'deg)';
      wrap.setAttribute('data-oid',o.id);
      sc.appendChild(wrap);
    }
    var target=hasRot?wrap:sc;
    var txImg=o.texture||null;

    if(o.type==='cylinder'||o.type==='pillar'){
      var scx,scy;
      if(hasRot){scx=0;scy=0}else{scx=ox+o.x*S+o.r*S;scy=oy+D-(o.y+o.r)*S}
      mkCyl(target,scx,scy,o.r*S,o.h*S,o.z*S,o.color,al,bw,bc,o.id);
      var lb=document.createElement('div');var sr=o.r*S;
      lb.style.cssText='position:absolute;left:'+(scx-sr)+'px;top:'+(scy-sr)+'px;width:'+(sr*2)+'px;height:'+(sr*2)+'px;display:flex;align-items:center;justify-content:center;font-size:8px;color:white;font-weight:500;text-shadow:0 1px 3px rgba(0,0,0,.8);pointer-events:none;transform:translateZ('+(o.z*S+o.h*S+1)+'px)';
      lb.textContent=o.name;target.appendChild(lb);
    }else if(isSp&&o.shape&&o.shape!=='rect'){
      var spx,spy;
      if(hasRot){spx=-o.w*S/2;spy=-o.d*S/2}else{spx=ox+o.x*S;spy=oy+D-(o.y+o.d)*S}
      mkCurvedSpace(target,spx,spy,o.w*S,o.d*S,o.h*S,o.z*S,o.color,al,bw,bc,o.id,o.shape);
      var lb=document.createElement('div');
      lb.style.cssText='position:absolute;left:'+spx+'px;top:'+spy+'px;width:'+(o.w*S)+'px;height:'+(o.d*S)+'px;display:flex;align-items:center;justify-content:center;font-size:8px;color:white;font-weight:500;text-shadow:0 1px 3px rgba(0,0,0,.8);pointer-events:none;transform:translateZ('+(o.z*S+o.h*S+1)+'px)';
      lb.textContent=o.name+(o.locked?' 🔒':'');target.appendChild(lb);
    }else{
      var spx,spy;
      if(hasRot){spx=-o.w*S/2;spy=-o.d*S/2}else{spx=ox+o.x*S;spy=oy+D-(o.y+o.d)*S}
      mkBox(target,spx,spy,o.w*S,o.d*S,o.h*S,o.z*S,o.color,al,bw,bc,o.id,isSp,txImg);
      var lb=document.createElement('div');
      lb.style.cssText='position:absolute;left:'+spx+'px;top:'+spy+'px;width:'+(o.w*S)+'px;height:'+(o.d*S)+'px;display:flex;align-items:center;justify-content:center;font-size:8px;color:white;font-weight:500;text-shadow:0 1px 3px rgba(0,0,0,.8);pointer-events:none;transform:translateZ('+(o.z*S+o.h*S+1)+'px)';
      lb.textContent=o.name+(o.locked?' 🔒':'');target.appendChild(lb);
    }
  });
  updSc();
}

// Colors
var cols=['#4F8CFF','#3DD68C','#FF5757','#FFB84D','#FF6B9D','#4DE8D0','#A78BFA','#F472B6','#94A3B8','#FFFFFF'];
var martCols=['#C0A882','#5BB8FF','#4DE8FF','#A78BFA','#888580','#AAAAAA','#E0C8A0','#7EC8E3','#95D5B2','#CDB4DB'];
function mkPalette(id,cs){
  document.getElementById(id).innerHTML='';
  cs.forEach(function(c){var el=document.createElement('div');el.className='cw'+(c===cC?' a':'');el.style.background=c;el.onclick=function(){cC=c;document.querySelectorAll('.cw').forEach(function(s){s.classList.remove('a')});el.classList.add('a');if(sel){var o=O.find(function(x){return x.id===sel});if(o){o.color=c;ren();ren2d();rL()}}};document.getElementById(id).appendChild(el)});
}
mkPalette('cP',cols);mkPalette('cP2',martCols);

// List
function rL(){
  oL.innerHTML='';
  O.forEach(function(o){
    var el=document.createElement('div');el.className='oi'+(o.id===sel?' sel':'')+(o.locked?' lk':'');
    var ss;if(o.type==='cylinder'||o.type==='pillar')ss='R='+o.r+' H='+o.h;else ss=o.w+'×'+o.d+'×'+o.h;
    var ic=o.type==='space'?'⊞':(isMart(o)?'★':'');
    var li=o.locked?'🔓':'🔒';
    var txBadge=o.texture?'<span style="color:var(--org);font-size:8px;margin-left:3px">📷</span>':'';
    el.innerHTML='<div class="nm"><span class="dt" style="background:'+o.color+'"></span>'+ic+o.name+txBadge+'</div><div class="cd">pos('+r2(o.x)+','+r2(o.y)+','+r2(o.z)+') '+ss+'</div><div class="ac"><button class="ab" data-a="dup">⧉</button><button class="ab" data-a="lk">'+li+'</button><button class="ab dl" data-a="del">×</button></div>';
    el.onclick=function(e){var a=e.target.getAttribute('data-a');
      if(a==='del'){O=O.filter(function(x){return x.id!==o.id});if(sel===o.id){sel=null;pp.style.display='none'}uI();ren();ren2d();rL();return}
      if(a==='lk'){o.locked=!o.locked;ren();ren2d();rL();return}
      if(a==='dup'){var cp=JSON.parse(JSON.stringify(o));cp.id=nI++;cp.name=o.name+' 복사';cp.x=r2(o.x+.5);cp.y=r2(o.y+.5);cp.locked=false;O.push(cp);sel=cp.id;ren();ren2d();rL();sP(cp);return}
      sel=o.id;ren();ren2d();rL();sP(o)};
    oL.appendChild(el)
  })
}

// Props
function sP(o){
  pp.style.display='block';
  document.getElementById('pN').value=o.name;
  document.getElementById('pX').value=o.x;document.getElementById('pY').value=o.y;document.getElementById('pZ').value=o.z;
  document.getElementById('pRX').value=o.rx||0;document.getElementById('pRY').value=o.ry||0;document.getElementById('pRZ').value=o.rz||0;
  if(o.type==='cylinder'||o.type==='pillar'){document.getElementById('sR').style.display='none';document.getElementById('rR').style.display='flex';document.getElementById('pR').value=o.r;document.getElementById('pCH').value=o.h}
  else{document.getElementById('sR').style.display='flex';document.getElementById('rR').style.display='none';document.getElementById('pW').value=o.w;document.getElementById('pD').value=o.d;document.getElementById('pH').value=o.h}

  // Texture section only for mart objects
  var txS=document.getElementById('txSection');
  var txBox=document.getElementById('txBox');
  var txImg=document.getElementById('txImg');
  var txPh=document.getElementById('txPh');
  var txClr=document.getElementById('txClr');
  if(isMart(o)){
    txS.style.display='block';
    if(o.texture){
      txImg.src=o.texture;txImg.style.display='block';txPh.style.display='none';txClr.style.display='block';
      txBox.title=o.textureName||'';
    }else{
      txImg.style.display='none';txPh.style.display='block';txClr.style.display='none';
    }
  }else{
    txS.style.display='none';
  }
}

window.uP=function(){
  if(!sel)return;var o=O.find(function(x){return x.id===sel});if(!o||o.locked)return;
  o.name=document.getElementById('pN').value;o.x=parseFloat(document.getElementById('pX').value)||0;o.y=parseFloat(document.getElementById('pY').value)||0;o.z=parseFloat(document.getElementById('pZ').value)||0;
  o.rx=parseFloat(document.getElementById('pRX').value)||0;o.ry=parseFloat(document.getElementById('pRY').value)||0;o.rz=parseFloat(document.getElementById('pRZ').value)||0;
  if(o.type==='cylinder'||o.type==='pillar'){o.r=parseFloat(document.getElementById('pR').value)||.5;o.h=parseFloat(document.getElementById('pCH').value)||1}
  else{o.w=parseFloat(document.getElementById('pW').value)||1;o.d=parseFloat(document.getElementById('pD').value)||1;o.h=parseFloat(document.getElementById('pH').value)||1}
  ren();ren2d();rL();uI();
};

window.rO=function(axis,deg){
  if(!sel)return;var o=O.find(function(x){return x.id===sel});if(!o||o.locked)return;
  if(axis==='x')o.rx=((o.rx||0)+deg)%360;
  else if(axis==='y')o.ry=((o.ry||0)+deg)%360;
  else o.rz=((o.rz||0)+deg)%360;
  sP(o);ren();ren2d();rL();
};

// Camera & 3D drag
window.sv=function(z,x){rZ=z;rX=x;updSc()};
function updSc(){sc.style.transform='scale('+zoom+') rotateX('+rX+'deg) rotateZ('+rZ+'deg)'}
function sM(m){mI.className='mi'+(m==='d'?' md':m==='r'?' mr':'');mI.textContent=m==='d'?'이동 모드':m==='r'?'회전 모드':''}
function s2f(dx,dy){var zr=rZ*Math.PI/180,xr=rX*Math.PI/180;var cZ=Math.cos(zr),sZ=Math.sin(zr),cX=Math.cos(xr);if(Math.abs(cX)<.01)cX=.01;var d2=dy/cX;return{cx:(dx*cZ+d2*sZ)/S,cy:-(-dx*sZ+d2*cZ)/S}}

var SNAP=0.1;
function snap(o){
  var ow=o.w||0,od=o.d||0;
  if(o.type==='cylinder'||o.type==='pillar'){ow=o.r*2;od=o.r*2}
  var L=o.x,R=o.x+ow,B=o.y,T=o.y+od;
  var xSnaps=[0,RW],ySnaps=[0,RD];
  O.forEach(function(t){if(t.id===o.id)return;var tw=t.w||0,td=t.d||0;if(t.type==='cylinder'||t.type==='pillar'){tw=t.r*2;td=t.r*2}xSnaps.push(t.x,t.x+tw);ySnaps.push(t.y,t.y+td)});
  var bestDx=SNAP+1,snapX=null;
  xSnaps.forEach(function(sx){var dL=Math.abs(L-sx),dR=Math.abs(R-sx);if(dL<bestDx){bestDx=dL;snapX=sx}if(dR<bestDx){bestDx=dR;snapX=sx-ow}});
  if(bestDx<=SNAP&&snapX!==null)o.x=r2(snapX);
  var bestDy=SNAP+1,snapY=null;
  ySnaps.forEach(function(sy){var dB=Math.abs(B-sy),dT=Math.abs(T-sy);if(dB<bestDy){bestDy=dB;snapY=sy}if(dT<bestDy){bestDy=dT;snapY=sy-od}});
  if(bestDy<=SNAP&&snapY!==null)o.y=r2(snapY);
}

function gO(el){while(el&&el.id!=='vp'){var o=el.getAttribute&&el.getAttribute('data-oid');if(o)return parseInt(o);el=el.parentElement}return null}

vp.addEventListener('mousedown',function(e){if(e.target.classList.contains('vb'))return;lx=e.clientX;ly=e.clientY;var oid=gO(e.target);if(oid!=null){var o=O.find(function(x){return x.id===oid});if(o&&!o.locked){oD=true;dO=o;sel=o.id;ren();ren2d();rL();sP(o);sM('d')}else if(o){sel=o.id;ren();ren2d();rL();sP(o);cD=true;sM('r')}}else{cD=true;sM('r')}e.preventDefault()});
window.addEventListener('mousemove',function(e){var dx=e.clientX-lx,dy=e.clientY-ly;if(oD&&dO){var mv=s2f(dx,dy);dO.x=r2(dO.x+mv.cx);dO.y=r2(dO.y+mv.cy);snap(dO);ren();ren2d();rL();sP(dO)}else if(cD){rZ+=dx*.4;rX=Math.max(0,Math.min(90,rX-dy*.4));updSc()}lx=e.clientX;ly=e.clientY});
window.addEventListener('mouseup',function(){cD=false;oD=false;dO=null;sM('')});
vp.addEventListener('wheel',function(e){e.preventDefault();zoom=Math.max(0.3,Math.min(3,zoom+(e.deltaY>0?-0.05:0.05)));updSc()},{passive:false});

// Touch
var pinchDist=0;
vp.addEventListener('touchstart',function(e){if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinchDist=Math.sqrt(dx*dx+dy*dy)}else if(e.touches.length===1){var t=e.touches[0];lx=t.clientX;ly=t.clientY;var el=document.elementFromPoint(t.clientX,t.clientY);var oid=gO(el);if(oid!=null){var o=O.find(function(x){return x.id===oid});if(o&&!o.locked){oD=true;dO=o;sel=o.id;ren();ren2d();rL();sP(o);sM('d')}else{cD=true;sM('r')}}else{cD=true;sM('r')}}},{passive:true});
window.addEventListener('touchmove',function(e){if(e.touches.length===2){var dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;var dist=Math.sqrt(dx*dx+dy*dy);if(pinchDist>0){zoom=Math.max(0.3,Math.min(3,zoom*(dist/pinchDist)));updSc()}pinchDist=dist}else if(e.touches.length===1){var t=e.touches[0];var dx=t.clientX-lx,dy=t.clientY-ly;if(oD&&dO){var mv=s2f(dx,dy);dO.x=r2(dO.x+mv.cx);dO.y=r2(dO.y+mv.cy);snap(dO);ren();ren2d();rL();sP(dO)}else if(cD){rZ+=dx*.4;rX=Math.max(0,Math.min(90,rX-dy*.4));updSc()}lx=t.clientX;ly=t.clientY}},{passive:true});
window.addEventListener('touchend',function(){cD=false;oD=false;dO=null;sM('')});

// Save/Load (JSON now includes texture as dataURL - warn if large)
function gSl(){try{return JSON.parse(localStorage.getItem('zoa3d_slots'))||{}}catch(e){return{}}}
function sSl(s){try{localStorage.setItem('zoa3d_slots',JSON.stringify(s))}catch(e){alert('저장 용량 초과. 텍스처 포함 시 용량이 커집니다.')}}
function gSt(){return{title:document.getElementById('projTitle').value,room:{w:RW,d:RD,h:RH},objects:O.map(function(o){var c=Object.assign({},o);delete c._txImg;return c}),nextId:nI}}
function lSt(d){
  if(d.title)document.getElementById('projTitle').value=d.title;
  if(d.room){RW=d.room.w;RD=d.room.d;RH=d.room.h}
  O=d.objects||[];
  nI=d.nextId||Math.max.apply(null,O.map(function(o){return o.id}).concat([0]))+1;
  // Reload textures
  O.forEach(function(o){if(o.texture){var img=new Image();img.src=o.texture;img.onload=function(){o._txImg=img;ren();ren2d()}}});
  sel=null;pp.style.display='none';uI();ren();ren2d();rL();
}
function rSl(){
  var sl=document.getElementById('sL');sl.innerHTML='';var ss=gSl();
  for(var i=1;i<=5;i++){var s=ss['s'+i];var h=!!s;var n=h?s.name:'(비어있음)';var dt=h?s.date:'';var oc=h?s.data.objects.length:0;
  var d=document.createElement('div');d.style.cssText='background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:7px 9px;margin-bottom:4px';
  d.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><span style="font-size:11px;font-weight:500">'+(h?'💾':'○')+' '+i+'안: '+n+'</span><span style="font-size:9px;color:var(--t2)">'+dt+'</span></div>'+(h?'<div style="font-size:9px;color:var(--t2);margin-bottom:4px">오브젝트 '+oc+'개</div>':'')+'<div style="display:flex;gap:3px"><button class="eb gn" style="font-size:9px;padding:3px" onclick="svSl('+i+')">저장</button>'+(h?'<button class="eb" style="font-size:9px;padding:3px" onclick="ldSl('+i+')">불러오기</button><button class="eb dn" style="font-size:9px;padding:3px" onclick="dlSl('+i+')">삭제</button>':'')+'</div>';
  sl.appendChild(d)}
}
window.svSl=function(i){var n=prompt('저장 이름:',i+'안');if(n===null)return;var ss=gSl();ss['s'+i]={name:n,date:new Date().toLocaleDateString()+' '+new Date().toLocaleTimeString(),data:gSt()};sSl(ss);rSl()};
window.ldSl=function(i){var ss=gSl();var s=ss['s'+i];if(!s)return;if(!confirm('"'+s.name+'" 불러오기?'))return;lSt(s.data)};
window.dlSl=function(i){if(!confirm(i+'안 삭제?'))return;var ss=gSl();delete ss['s'+i];sSl(ss);rSl()};
window.eJ=function(){var d=JSON.stringify(gSt(),null,2);var b=new Blob([d],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='zoa_mart_model.json';a.click()};
window.iJ=function(){document.getElementById('fI').click()};
document.getElementById('fI').addEventListener('change',function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{lSt(JSON.parse(ev.target.result))}catch(er){alert('JSON 오류')}};r.readAsText(f);e.target.value=''});
window.cA=function(){if(!confirm('전체 삭제?'))return;O=[];sel=null;pp.style.display='none';ren();ren2d();rL()};

// Resize handler for 2D canvas
window.addEventListener('resize',function(){ren2d()});

uI();ren();ren2d();rL();
})();
</script>
</body>
